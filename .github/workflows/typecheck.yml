name: Typecheck & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx tsc --noEmit

      - run: npm test
